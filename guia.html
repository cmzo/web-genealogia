  <script>
    function _calloutLabel(t) {
      return ({note:'Nota',info:'Información',tip:'Consejo',hint:'Pista',important:'Importante',warning:'Advertencia',caution:'Precaución',danger:'Peligro',error:'Error',success:'Éxito',quote:'Cita',example:'Ejemplo'})[t] || t.charAt(0).toUpperCase() + t.slice(1);
    }
    function _calloutIcon(t) {
      return ({note:'ℹ',info:'ℹ',tip:'✦',hint:'✦',important:'★',warning:'▲',caution:'▲',danger:'✕',error:'✕',success:'✓',quote:'"',example:'◆'})[t] || '·';
    }
    function processCallouts(html) {
      return html.replace(/<blockquote>\n<p>\[!([A-Za-z_]+)\]([^\n<]*)([\s\S]*?)<\/blockquote>/g, (m, type, titleRest, bodyRest) => {
        const t = type.toLowerCase();
        const title = titleRest.trim() || _calloutLabel(t);
        let body = bodyRest;
        if (body.startsWith('\n')) body = body.substring(1).replace(/^([^<]*)<\/p>/, (_, c) => c.trim() ? `<p>${c.trim()}</p>` : '');
        else body = body.replace(/^<\/p>/, '').trim();
        body = body.trim();
        return `<div class="callout callout--${t}"><div class="callout-title"><span class="callout-icon">${_calloutIcon(t)}</span><span>${title}</span></div>${body ? `<div class="callout-body">${body}</div>` : ''}</div>`;
      });
    }

    const url = window.getContentPath?.('guia.md') ?? './content/guia.md';
    fetch(url)
      .then(r => r.text())
      .then(md => {
        md = md.replace(/==([^=\n]+)==/g, '<mark>$1</mark>');
        let html = marked.parse(md);
        html = processCallouts(html);
        document.querySelector('.guia-content').innerHTML = html;
      })
      .catch(() => {
        document.querySelector('.guia-content').innerHTML = '<p>No se pudo cargar la guía.</p>';
      });
  </script>
