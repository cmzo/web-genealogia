<body data-section="gen" data-page="arbol">

  <a href="#main-content" class="skip-link">Saltar al contenido</a>

  <header class="cmzo-top"><!-- la genera nav.js según data-section --></header>

    <main id="main-content" class="cmzo-app">
      <div class="tree-toolbar">
        <span class="tree-toolbar-hint">Buscá cualquier persona con <kbd class="tree-toolbar-key" data-cmdk-key>⌘K</kbd></span>
        <div class="zoom-controls">
          <button id="zoomInBtn"  class="zoom-btn" title="Acercar (+)">+</button>
          <button id="zoomOutBtn" class="zoom-btn" title="Alejar (-)">−</button>
        </div>
      </div>

      <div class="tree-wrapper">
        <div class="tree-container" id="tree-container"></div>

        <div class="panel-peek" id="panelPeek">
          <span class="panel-peek-name" id="panelPeekName"></span>
          <span class="panel-peek-cta">Abrir ficha</span>
        </div>

        <div class="tree-panel" id="treePanel">
          <button class="tree-panel-close" id="treePanelClose" title="Cerrar" aria-label="Cerrar"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
          <div class="panel-hero" id="treePanelHero"></div>
          <div class="panel-tabs" id="panelTabs">
            <button class="panel-tab is-active" data-tab="persona">Persona</button>
            <button class="panel-tab" data-tab="archivos">Archivos</button>
          </div>
          <div class="tree-panel-body" id="treePanelBody"></div>
          <div class="panel-footer">
            <button class="panel-expand-btn" id="panelExpandBtn" type="button" aria-expanded="false" title="Ampliar el panel">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
              <span class="panel-expand-label">Ampliar panel</span>
            </button>
          </div>
        </div>
      </div>
    </main>

  <footer class="cmzo-foot">
    <div class="cmzo-foot-inner">
      <div class="sig">// diseñado y mantenido por <b>Matías Clemenzo</b> · 2026</div>
      <div class="cmzo-foot-links"><a href="colaborar.html">colaborar</a><a href="changelog.html">cambios</a></div>
    </div>
  </footer>

    <script src="./assets/js/path-config.js"></script>
    <script type="module">
        import { loadData, getAllPersonas }                              from './assets/js/arbol/data.js';
        import { setFocus, setSelected, on }                            from './assets/js/arbol/store.js';
        import { computeLayout }                                        from './assets/js/arbol/layout.js';
        import { initTree, render, rerender, recenterOn, zoomIn, zoomOut } from './assets/js/arbol/render.js';
        import { initPanel }                                            from './assets/js/arbol/panel.js';
        import { initKeyboard }                                         from './assets/js/arbol/keyboard.js';

        async function init() {
            await loadData();

            initTree('tree-container');
            initPanel();
            initKeyboard();

            on('focusChange', id => {
                const layout = computeLayout(id);
                render(layout);
                recenterOn();
            });

            // Redibuja al cambiar selección para aplicar el halo en la tarjeta correcta.
            // setSelected se llama justo después de setFocus, de ahí el setTimeout(0).
            on('selectionChange', () => setTimeout(rerender, 0));

            document.getElementById('zoomInBtn') .addEventListener('click', zoomIn);
            document.getElementById('zoomOutBtn').addEventListener('click', zoomOut);

            // Permite que el command palette enfoque una persona sin recargar
            window.__treeFocus = (id) => {
                if (!getAllPersonas().has(id)) return;
                setFocus(id);
                setSelected(id);
            };

            const personas = getAllPersonas();
            const wanted   = new URLSearchParams(location.search).get('focus');
            const target   = wanted && personas.get(wanted);
            const initial  = target
                          || personas.get('p93')
                          || [...personas.values()].find(p => p.generation === 1)
                          || [...personas.values()][0];
            if (initial) {
                setFocus(initial.id);
                if (target) setSelected(initial.id); // llega desde el buscador → abre su ficha
            }

            // Apertura directa de la línea de tiempo por URL (?timeline=p26)
            const wantTimeline = new URLSearchParams(location.search).get('timeline');
            if (wantTimeline && personas.get(wantTimeline)) {
                setFocus(wantTimeline);
                setSelected(wantTimeline);
                requestAnimationFrame(() => window.__openTimeline?.(wantTimeline));
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
<script src="assets/js/nav.js" defer></script>
