  <script>
    let allPersonas  = [];
    let personasMap  = new Map();
    let marriages    = [];
    let sorted       = [];
    let activeFilters = { branch: null, country: null };
    let searchQuery  = '';
    let onlyWithDocs = false;
    let sortState    = { key: null, dir: 'asc' };  // key null → orden por defecto (gen ↓, sort_order ↑)

    const norm = s => (s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().trim();
    const docCount = p => (p.media || []).length;

    const _branchColors = {
      'clemenzo':'#1e40af','roh':'#16a34a','roch':'#16a34a',
      'carvallo':'#8b5cf6','arceo':'#eab308','queipo':'#ea580c',
      'stalder':'#7c3aed','baster':'#6b7280','guido':'#c2410c',
      'putallaz':'#10b981','vasquez':'#dc2626','yanitelli':'#16a34a',
      'fracchia':'#ca8a04','garrido':'#0d9488','fernandez':'#a855f7',
      'cybulski':'#be185d','lantz':'#9333ea','vargas yegros':'#15803d',
      'venegas':'#0369a1','costabile':'#6366f1','default':'#9ca3af',
    };
    function getBranchColor(branch) {
      if (!branch?.trim()) return _branchColors.default;
      return _branchColors[branch.toLowerCase().trim()] ?? _branchColors.default;
    }

    function getCountry(p) {
      const place = (p.birth_place || p.death_place || '').toLowerCase();
      if (/valais|riddes|conthey|ardon|nendaz|sion|martigny|monthey|sierre|suiza|suisse|wallis/.test(place))
        return 'Suiza';
      if (/caba|capital federal|buenos aires|entre r[ií]os|paran[aá]|corrientes|santa fe|argentina|san jos[eé]|feliciano/.test(place))
        return 'Argentina';
      if (/italia|italy|liguría|liguria|piemonte|piamonte|g[eé]nova|napoli|veneto|sicilia|toscana|lombard/.test(place))
        return 'Italia';
      return null;
    }

    function applyFilters() {
      let result = sorted;
      if (activeFilters.branch)  result = result.filter(p => p.branch === activeFilters.branch);
      if (activeFilters.country) result = result.filter(p => getCountry(p) === activeFilters.country);
      if (onlyWithDocs)          result = result.filter(p => docCount(p) > 0);
      if (searchQuery) {
        const q = norm(searchQuery);
        result = result.filter(p => norm(p.name).includes(q) || norm(p.branch).includes(q));
      }
      if (sortState.key) result = sortResult(result);
      renderTable(result);
    }

    function sortResult(list) {
      const { key, dir } = sortState;
      const mul = dir === 'asc' ? 1 : -1;
      const val = p => {
        switch (key) {
          case 'name':       return norm(p.name);
          case 'branch':     return norm(p.branch);
          case 'year':       return Number(yearOf(p.birth_date).slice(0, 4)) || 0;
          case 'generation': return p.generation ?? -1;
          case 'items':      return docCount(p);
          default:           return 0;
        }
      };
      return [...list].sort((a, b) => {
        const va = val(a), vb = val(b);
        if (va < vb) return -1 * mul;
        if (va > vb) return  1 * mul;
        return 0;
      });
    }

    function buildPills(containerId, values, filterKey, maxVisible = 99) {
      const container = document.getElementById(containerId);

      // "Todos" pill
      const allBtn = document.createElement('button');
      allBtn.className = 'filter-pill is-active';
      allBtn.textContent = 'Todos';
      allBtn.dataset.value = '';
      container.appendChild(allBtn);

      values.forEach((v, i) => {
        const btn = document.createElement('button');
        btn.className = 'filter-pill';
        btn.textContent = v;
        btn.dataset.value = v;
        if (i >= maxVisible) btn.classList.add('pill-extra');
        container.appendChild(btn);
      });

      // "Ver más" toggle si hay extras
      if (values.length > maxVisible) {
        const extra = values.length - maxVisible;
        const toggle = document.createElement('button');
        toggle.className = 'filter-pill filter-pill-more';
        toggle.textContent = `+${extra} más`;
        container.appendChild(toggle);

        const setVisible = (show) => {
          container.querySelectorAll('.pill-extra').forEach(p => p.classList.toggle('pill-extra-hidden', !show));
          toggle.textContent = show ? 'Ver menos' : `+${extra} más`;
        };
        setVisible(false);
        toggle.addEventListener('click', e => { e.stopPropagation(); setVisible(toggle.textContent.startsWith('+')); });
      }

      container.addEventListener('click', e => {
        const pill = e.target.closest('.filter-pill:not(.filter-pill-more)');
        if (!pill) return;
        const wasActive = pill.classList.contains('is-active');
        container.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('is-active'));
        if (wasActive && pill.dataset.value !== '') {
          // Toggle off → volver a "Todos"
          allBtn.classList.add('is-active');
          activeFilters[filterKey] = null;
        } else {
          pill.classList.add('is-active');
          activeFilters[filterKey] = pill.dataset.value || null;
        }
        applyFilters();
      });
    }

    // ── Utilidades de fecha ──────────────────────────────

    function yearOf(dateStr) {
      if (!dateStr) return '';
      const r = String(dateStr).match(/^(\d{4})\/(\d{4})$/);
      if (r) return `${r[1]}/${r[2].slice(2)}`; // rango incierto: «1846/50»
      const m = String(dateStr).match(/^(\d{4})/);
      return m ? m[1] : '';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const m = String(dateStr).match(/^(\d{4})-(\d{2})-(\d{2})/);
      return m ? `${m[3]}/${m[2]}/${m[1]}` : dateStr;
    }

    function yearsText(p) {
      const b = yearOf(p.birth_date);
      const d = yearOf(p.death_date);
      if (!b && !d) return '';
      if (b && !d) return p.vivo === 'si' ? `${b} –` : `${b} – ?`;
      if (!b && d) return `? – ${d}`;
      return `${b} – ${d}`;
    }

    // ── Tabla ──────────────────────────────────────────

    function renderTable(personas) {
      const tbody = document.querySelector('#archivoTable tbody');
      tbody.innerHTML = '';
      personas.forEach(p => {
        const tr = document.createElement('tr');
        const items = (p.media || []).length;
        tr.innerHTML = `
          <td class="archivo-name">${p.name}</td>
          <td class="archivo-years">${yearsText(p)}</td>
          <td class="archivo-branch">${p.branch || ''}</td>
          <td class="archivo-gen">${p.generation ?? ''}</td>
          <td class="archivo-items">${items || ''}</td>
        `;
        tr.addEventListener('click', () => openModal(p));
        tbody.appendChild(tr);
      });
      const total = allPersonas.length;
      const shown = personas.length;
      document.getElementById('archivoCount').textContent =
        shown === total ? `${total} personas` : `${shown} de ${total} personas`;
    }

    // ── Modal ──────────────────────────────────────────

    function openModal(p) {
      const color = getBranchColor(p.branch);
      document.getElementById('modalName').textContent = p.name;
      const subEl = document.getElementById('modalSub');
      subEl.textContent = [yearsText(p), p.branch].filter(Boolean).join(' · ');
      if (p.branch) {
        const dot = document.createElement('span');
        dot.className = 'modal-branch-dot';
        dot.style.background = color;
        subEl.prepend(dot);
      }

      const body = document.getElementById('modalBody');
      body.innerHTML = '';

      // Fechas y lugares
      if (p.birth_date || p.birth_place || p.death_date || p.death_place) {
        const s = makeSection('Fechas y lugares');
        if (p.birth_date || p.birth_place)
          s.appendChild(makeRow('Nacimiento',
            [formatDate(p.birth_date), p.birth_place].filter(Boolean).join(', ')));
        if (p.death_date || p.death_place)
          s.appendChild(makeRow('Defunción',
            [formatDate(p.death_date), p.death_place].filter(Boolean).join(', ')));
        body.appendChild(s);
      }

      // Familia
      const father = p.father_id ? personasMap.get(p.father_id) : null;
      const mother = p.mother_id ? personasMap.get(p.mother_id) : null;
      const spouses = getSpouses(p);
      const children = allPersonas
        .filter(x => x.father_id === p.id || x.mother_id === p.id)
        .sort((a, b) => (Number(yearOf(a.birth_date).slice(0, 4)) || 0) - (Number(yearOf(b.birth_date).slice(0, 4)) || 0));
      if (father || mother || spouses.length || children.length) {
        const s = makeSection('Familia');
        if (father) s.appendChild(makePersonRow('Padre', father));
        if (mother) s.appendChild(makePersonRow('Madre', mother));
        if (spouses.length)  s.appendChild(makeChipRow(spouses.length > 1 ? 'Cónyuges' : 'Cónyuge', spouses));
        if (children.length) s.appendChild(makeChipRow(children.length > 1 ? 'Hijos' : 'Hijo', children));
        body.appendChild(s);
      }

      // Notas
      if (p.notes) {
        const s = makeSection('Notas');
        const t = document.createElement('p');
        t.className = 'modal-text';
        t.textContent = p.notes;
        s.appendChild(t);
        body.appendChild(s);
      }

      // Fuentes
      if (p.sources) {
        const s = makeSection('Fuentes');
        const t = document.createElement('p');
        t.className = 'modal-text';
        t.textContent = p.sources;
        s.appendChild(t);
        body.appendChild(s);
      }

      // Media (fotos y documentos, agrupados si comparten group_label)
      if ((p.media || []).length) {
        const allPhotos = p.media.filter(m => !m.type || m.type === 'photo');
        const s = makeSection('Archivos');
        renderMediaUnits(p.media, s, allPhotos);
        body.appendChild(s);
      }

      document.getElementById('modalBody').scrollTop = 0;
      document.getElementById('archivoOverlay').classList.add('is-open');
      document.getElementById('archivoOverlay').setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      syncFocusURL(p.id);
    }

    function closeModal() {
      document.getElementById('archivoOverlay').classList.remove('is-open');
      document.getElementById('archivoOverlay').setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
      syncFocusURL(null);
    }

    function syncFocusURL(id) {
      history.replaceState(null, '', id ? `?focus=${encodeURIComponent(id)}` : location.pathname);
    }

    function renderMediaUnits(media, container, allPhotos) {
      const seen = new Set();
      let singlesGallery = null;

      for (const m of media) {
        if (!m.group_label) {
          if (!m.type || m.type === 'photo') {
            if (!singlesGallery) {
              singlesGallery = document.createElement('div');
              singlesGallery.className = 'modal-gallery';
              container.appendChild(singlesGallery);
            }
            appendMediaItem(m, singlesGallery, allPhotos);
          } else {
            appendMediaItem(m, container, allPhotos);
          }
        } else if (!seen.has(m.group_label)) {
          seen.add(m.group_label);
          const wrap = document.createElement('div');
          wrap.className = 'modal-media-group';
          const lbl = document.createElement('p');
          lbl.className = 'modal-media-group-label';
          lbl.textContent = m.group_label;
          wrap.appendChild(lbl);
          const grid = document.createElement('div');
          grid.className = 'modal-gallery';
          wrap.appendChild(grid);
          media.filter(x => x.group_label === m.group_label)
               .forEach(item => appendMediaItem(item, grid, allPhotos));
          container.appendChild(wrap);
        }
      }
    }

    function appendMediaItem(m, container, allPhotos) {
      if (!m.type || m.type === 'photo') {
        const photoIdx = allPhotos.indexOf(m);
        const fig = document.createElement('figure');
        fig.className = 'modal-thumb';
        const img = document.createElement('img');
        img.src = m.url || '';
        img.alt = m.caption || '';
        img.loading = 'lazy';
        const cap = document.createElement('figcaption');
        cap.textContent = m.caption || '';
        fig.appendChild(img);
        fig.appendChild(cap);
        fig.addEventListener('click', () => openLightbox(allPhotos, photoIdx));
        container.appendChild(fig);
      } else {
        const li = document.createElement('p');
        li.className = 'modal-doc-item';
        const href = m.url || '#';
        li.innerHTML = `<a href="${href}" target="_blank" rel="noopener">${m.caption || 'Documento'}</a>`
          + (m.date ? `<span class="modal-doc-date">${m.date}</span>` : '');
        container.appendChild(li);
      }
    }

    function makeSection(title) {
      const div = document.createElement('div');
      div.className = 'modal-section';
      const h = document.createElement('p');
      h.className = 'modal-section-title';
      h.textContent = title;
      div.appendChild(h);
      return div;
    }

    function makeRow(label, value) {
      const p = document.createElement('p');
      p.className = 'modal-row';
      p.innerHTML = `<span class="modal-label">${label}</span>${value}`;
      return p;
    }

    // ── Navegación familiar ────────────────────────────

    function getSpouses(p) {
      const ids = new Set();
      marriages.forEach(m => {
        if (m.spouse1_id === p.id && m.spouse2_id) ids.add(m.spouse2_id);
        if (m.spouse2_id === p.id && m.spouse1_id) ids.add(m.spouse1_id);
      });
      // Respaldo: el otro progenitor de cada hijo
      allPersonas.forEach(c => {
        if (c.father_id === p.id && c.mother_id) ids.add(c.mother_id);
        if (c.mother_id === p.id && c.father_id) ids.add(c.father_id);
      });
      ids.delete(p.id);
      return [...ids].map(id => personasMap.get(id)).filter(Boolean);
    }

    function makePersonLink(person) {
      const a = document.createElement('a');
      a.className = 'modal-link';
      a.textContent = person.name;
      a.setAttribute('role', 'button');
      a.tabIndex = 0;
      a.addEventListener('click', () => openModal(person));
      a.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(person); }
      });
      return a;
    }

    function makePersonRow(label, person) {
      const row = document.createElement('p');
      row.className = 'modal-row';
      const lab = document.createElement('span');
      lab.className = 'modal-label';
      lab.textContent = label;
      row.appendChild(lab);
      row.appendChild(makePersonLink(person));
      return row;
    }

    function makeChipRow(label, people) {
      const row = document.createElement('p');
      row.className = 'modal-row';
      const lab = document.createElement('span');
      lab.className = 'modal-label';
      lab.textContent = label;
      row.appendChild(lab);
      const list = document.createElement('span');
      list.className = 'modal-link-list';
      people.forEach(pp => {
        const chip = makePersonLink(pp);
        chip.classList.add('modal-link-chip');
        list.appendChild(chip);
      });
      row.appendChild(list);
      return row;
    }

    // ── Lightbox ───────────────────────────────────────

    let lbState = { items: [], index: 0 };

    function openLightbox(items, index) {
      lbState = { items, index };
      const m = items[index];
      document.getElementById('lbImg').src = m.full || m.url || m.filename || m.thumb || '';
      document.getElementById('lbCaption').textContent = m.caption || '';
      document.getElementById('lightbox').classList.add('is-open');
      document.getElementById('lightbox').setAttribute('aria-hidden', 'false');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('is-open');
      document.getElementById('lightbox').setAttribute('aria-hidden', 'true');
    }

    function navLightbox(offset) {
      if (!lbState.items.length) return;
      lbState.index = (lbState.index + offset + lbState.items.length) % lbState.items.length;
      const m = lbState.items[lbState.index];
      document.getElementById('lbImg').src = m.full || m.url || m.filename || m.thumb || '';
      document.getElementById('lbCaption').textContent = m.caption || '';
    }

    // ── Inicio ─────────────────────────────────────────

    (async function main() {
      const url = window.getDataPath?.('arbol.json') ?? './assets/data/arbol.json';
      const res  = await fetch(url);
      const json = await res.json();
      allPersonas  = json.personas || [];
      marriages    = json.matrimonios || [];
      personasMap  = new Map(allPersonas.map(p => [p.id, p]));

      // Permite que el buscador global (cmd+K) abra la ficha acá, sin salir del archivo
      window.__personaFocus = (id) => { const p = personasMap.get(id); if (p) openModal(p); };

      sorted = [...allPersonas].sort((a, b) => {
        const gd = (b.generation ?? 0) - (a.generation ?? 0);
        return gd !== 0 ? gd : (a.sort_order ?? 0) - (b.sort_order ?? 0);
      });

      // Pills de rama — ordenadas por cantidad de miembros, top 5 visibles
      const branchCounts = {};
      sorted.forEach(p => { if (p.branch) branchCounts[p.branch] = (branchCounts[p.branch] || 0) + 1; });
      const branches = Object.keys(branchCounts).sort((a, b) => branchCounts[b] - branchCounts[a]);
      buildPills('branchPills', branches, 'branch', 5);

      // Pills de país
      const countries = [...new Set(sorted.map(getCountry).filter(Boolean))].sort();
      buildPills('countryPills', countries, 'country');

      // Buscador por texto
      const searchInput = document.getElementById('archivoSearch');
      searchInput.addEventListener('input', () => { searchQuery = searchInput.value; applyFilters(); });

      // Toggle «solo con documentos»
      const docsBtn = document.getElementById('docsToggle');
      docsBtn.addEventListener('click', () => {
        onlyWithDocs = !onlyWithDocs;
        docsBtn.classList.toggle('is-active', onlyWithDocs);
        applyFilters();
      });

      // Orden por columnas
      document.querySelectorAll('#archivoTable thead th[data-sort]').forEach(th => {
        th.addEventListener('click', () => {
          const key = th.dataset.sort;
          if (sortState.key === key) {
            sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
          } else {
            sortState.key = key;
            sortState.dir = (key === 'name' || key === 'branch') ? 'asc' : 'desc';
          }
          document.querySelectorAll('#archivoTable thead th[data-sort]').forEach(h => {
            h.classList.toggle('is-sorted', h === th);
            const arrow = h.querySelector('.th-arrow');
            if (arrow) arrow.textContent = (h === th && sortState.dir === 'asc') ? '▲' : '▼';
          });
          applyFilters();
        });
      });

      applyFilters();

      // Apertura directa por URL (?focus=p38) — enlaces compartibles
      const focusId = new URLSearchParams(location.search).get('focus');
      if (focusId && personasMap.has(focusId)) openModal(personasMap.get(focusId));

      // Modal
      document.getElementById('modalClose').addEventListener('click', closeModal);
      document.getElementById('archivoOverlay').addEventListener('click', e => {
        if (e.target.id === 'archivoOverlay') closeModal();
      });

      // Lightbox
      document.getElementById('lbClose').addEventListener('click', closeLightbox);
      document.getElementById('lbPrev').addEventListener('click', () => navLightbox(-1));
      document.getElementById('lbNext').addEventListener('click', () => navLightbox(1));
      document.getElementById('lightbox').addEventListener('click', e => {
        if (e.target.id === 'lightbox') closeLightbox();
      });

      document.addEventListener('keydown', e => {
        if (document.getElementById('lightbox').classList.contains('is-open')) {
          if (e.key === 'Escape')     closeLightbox();
          if (e.key === 'ArrowLeft')  navLightbox(-1);
          if (e.key === 'ArrowRight') navLightbox(1);
        } else if (document.getElementById('archivoOverlay').classList.contains('is-open')) {
          if (e.key === 'Escape') closeModal();
        }
      });
    })();
  </script>
<script src="assets/js/nav-drawer.js" defer></script>
<script src="assets/js/theme.js" defer></script>
<script src="assets/js/command-palette.js" defer></script>
</body>
