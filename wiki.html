<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script>(function(){try{var t=localStorage.getItem("theme");if(!t)t=matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
    <link rel="icon" href="./assets/images/favicon.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body data-section="gen" data-page="wiki">

  <a href="#main-content" class="skip-link">Saltar al contenido</a>

  <header class="cmzo-top"><!-- la genera nav.js según data-section --></header>

    <main id="main-content" class="cmzo-app">
      <div class="wiki-graph-wrapper">
        <div class="wiki-graph" id="wikiGraph"></div>

        <div class="wiki-graph-zoom">
          <button id="wikiZoomIn"  class="zoom-btn" title="Acercar (+)">+</button>
          <button id="wikiZoomOut" class="zoom-btn" title="Alejar (−)">−</button>
        </div>

        <div class="wiki-legend" id="wikiLegend"></div>

        <aside class="wiki-panel" id="wikiPanel">
          <button class="wiki-panel-close" id="wikiPanelClose" title="Cerrar" aria-label="Cerrar">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          <div class="wiki-panel-body" id="wikiPanelBody"></div>
        </aside>
      </div>
    </main>

  <div class="wiki-modal" id="wikiModal" role="dialog" aria-modal="true">
    <div class="wiki-modal-card">
      <button class="wiki-modal-close" id="wikiModalClose" title="Cerrar" aria-label="Cerrar">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="wiki-modal-body" id="wikiModalBody"></div>
    </div>
  </div>

  <footer class="cmzo-foot">
    <div class="cmzo-foot-inner">
      <div class="sig">// diseñado y mantenido por <b>Matías Clemenzo</b> · 2026</div>
      <div class="cmzo-foot-links"><a href="colaborar.html">colaborar</a><a href="changelog.html">cambios</a></div>
    </div>
  </footer>

  <script src="./assets/js/path-config.js"></script>
  <script type="module" src="./assets/js/wiki/graph.js"></script>
  <script src="./assets/js/nav.js" defer></script>
  <script src="./assets/js/nav-drawer.js" defer></script>
  <script src="./assets/js/theme.js" defer></script>
  <script src="./assets/js/command-palette.js" defer></script>

</body>
</html>
