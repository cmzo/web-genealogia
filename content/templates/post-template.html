<!doctype html>
<html lang="{{lang}}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="../../assets/images/favicon.png" type="image/png">
  <title>{{title}} · Matías Clemenzo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <style>
    .lang-selector { display: flex; gap: 4px; justify-content: flex-end; margin: 0 0 18px; font-family: 'Inter', sans-serif; }
    .lang-selector .lang-opt { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; padding: 3px 9px; border-radius: 999px; text-decoration: none; border: 1px solid var(--border); color: var(--muted); transition: color .15s, border-color .15s, background .15s; }
    .lang-selector a.lang-opt:hover { color: var(--text); border-color: var(--text); }
    .lang-selector .lang-opt.is-active { background: var(--text); color: var(--bg); border-color: var(--text); cursor: default; }
  </style>
</head>
<body>

  <header class="site-nav">
    <a href="../../index.html" class="nav-brand">Clemenzo</a>
    <nav class="nav-actions">
      <a href="../../blog.html" class="nav-link nav-mobile-link">Blog</a>
      <a href="../../sobre.html" class="nav-link nav-mobile-link">Sobre</a>
      <a href="https://github.com/cmzo/web-genealogia" target="_blank" rel="noopener noreferrer" class="nav-link" aria-label="Repositorio en GitHub">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
      </a>
    </nav>
  </header>

  <div class="site-body">
    <aside class="site-sidebar">
      <nav class="sidebar-nav">
        <a href="../../sobre.html" class="sidebar-link">Sobre</a>
        <a href="../../arbol-matrimonios.html" class="sidebar-link">Árbol</a>
        <a href="../../archivo.html" class="sidebar-link">Archivo</a>
        <a href="../../blog.html" class="sidebar-link is-active">Blog</a>
        <a href="../../fuentes.html" class="sidebar-link">Fuentes</a>
        <a href="../../contacto.html" class="sidebar-link sidebar-link--icon" title="Contacto" aria-label="Contacto"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg> Contacto</a>
      </nav>
      <div class="sidebar-bottom">
        <a href="../../changelog.html" class="sidebar-link sidebar-link--minor">Cambios</a>
      </div>
    </aside>

    <main class="site-main">
      <div class="article-container">
        <div class="top-bar">
          <a class="back-home" href="../../blog.html" aria-label="Volver al blog">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
            Blog
          </a>
        </div>

        {{langselector}}

        <header class="article-header">
          <p class="article-kicker">{{kicker}}</p>
          <h1 class="article-title">{{title}}</h1>
          <div class="article-meta">
            <div class="author-avatar"><img src="../../assets/images/avatars/matias.png" alt="Avatar de Matías Clemenzo" loading="lazy"></div>
            <div class="meta-text">
              <div><strong>Por Matías Clemenzo</strong></div>
              <div id="meta-edition">Publicado {{date}}</div>
            </div>
          </div>
        </header>

        <section class="article-grid">
          <article class="article-content">
            {{content}}
          </article>
          <aside class="article-aside">
            {{aside}}
          </aside>
        </section>
      </div>
    </main>
  </div>

  <button class="back-to-top" id="backToTop" aria-label="Volver arriba" onclick="document.querySelector('.site-main').scrollTo({top:0,behavior:'smooth'})">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
  </button>

  <footer class="site-footer">
    <p class="footer-desc">Diseñado y mantenido por <strong>Matías Clemenzo</strong> · 2026</p>
    <nav class="footer-mobile-nav">
      <a href="../../contacto.html" class="footer-nav-link">Contacto</a>
      <a href="../../changelog.html" class="footer-nav-link">Cambios</a>
    </nav>
  </footer>

  <script>
    (function() {
      const btn = document.getElementById('backToTop');
      const scroller = document.querySelector('.site-main');
      scroller.addEventListener('scroll', function() {
        btn.classList.toggle('visible', scroller.scrollTop > 400);
      });
    })();
  </script>

  <script src="../../assets/js/nav-drawer.js" defer></script>
  <script src="../../assets/js/command-palette.js" defer></script>

  <script>
    (function() {
      const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
      const now = new Date();
      const dateStr = `${now.getDate()} de ${months[now.getMonth()]} de ${now.getFullYear()}`;
      const metaEdition = document.getElementById('meta-edition');
      if (metaEdition) metaEdition.textContent = `Publicado {{date}} · Última edición ${dateStr}`;
    })();
  </script>

</body>
</html>
