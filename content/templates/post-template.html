<!doctype html>
<html lang="{{lang}}">
<head>
  <meta charset="utf-8" />
  <script>(function(){try{var t=localStorage.getItem("theme");if(!t)t=matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="../../assets/images/favicon.png" type="image/png">
  <title>{{title}} · Matías Clemenzo</title>
  <meta name="description" content="{{description}}" />
  <link rel="canonical" href="{{canonical}}" />
  <meta property="og:type" content="article" />
  <meta property="og:title" content="{{title}} · Matías Clemenzo" />
  <meta property="og:description" content="{{description}}" />
  <meta property="og:url" content="{{canonical}}" />
  <meta property="og:image" content="{{ogimage}}" />
  <link rel="stylesheet" href="../../assets/css/styles.css" />
  <link rel="stylesheet" href="../../assets/css/home.css" />
  <style>
    /* Selector de idioma del post — estilo mono (cajita como el de la nav / colaborar) */
    .lang-selector { display: flex; justify-content: flex-end; margin: 0 0 20px; }
    .lang-pillbox { display: inline-flex; align-items: center; gap: 1px; padding: 3px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); }
    .lang-globe { width: 13px; height: 13px; color: var(--muted); flex-shrink: 0; margin: 0 4px; }
    .lang-opt { font-family: var(--mono); font-size: 11px; font-weight: 500; padding: 4px 8px; border-radius: 5px; text-decoration: none; color: var(--muted); transition: color .15s, background .15s; }
    a.lang-opt:hover { color: var(--text); }
    .lang-opt.is-active { background: color-mix(in srgb, var(--accent) 16%, var(--surface)); color: var(--accent); cursor: default; }
  </style>
</head>
<body data-section="blog" data-nav-prefix="../../" data-page-label="{{title}}">

  <a href="#main-content" class="skip-link">Saltar al contenido</a>

  <header class="cmzo-top"><!-- la genera nav.js según data-section --></header>

  <main class="cmzo cmzo-wrap cmzo-page" id="main-content">
      <div class="article-container">
        <div class="top-bar">
          <a class="back-home" href="../../blog.html" aria-label="Volver al blog">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
            Blog
          </a>
        </div>

        {{langselector}}

        <header class="article-header">
          <p class="article-kicker">{{kicker}}</p>
          <h1 class="article-title">{{title}}</h1>
          <div class="article-meta">
            <div class="author-avatar"><img src="../../assets/images/avatars/matias.png" alt="Avatar de Matías Clemenzo" width="40" height="40" loading="lazy"></div>
            <div class="meta-text">
              <div><strong>Por Matías Clemenzo</strong></div>
              <div id="meta-edition">Publicado {{date}}</div>
            </div>
          </div>
        </header>

        <section class="article-grid">
          <article class="article-content">
            {{content}}
          </article>
          <aside class="article-aside">
            {{aside}}
          </aside>
        </section>
      </div>
    </main>

  <button class="back-to-top" id="backToTop" aria-label="Volver arriba" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
  </button>

  <footer class="cmzo-foot">
    <div class="cmzo-foot-inner">
      <div class="sig">// diseñado y mantenido por <b>Matías Clemenzo</b> · 2026</div>
      <div class="cmzo-foot-links"><a href="../../colaborar.html">colaborar</a><a href="../../changelog.html">cambios</a></div>
    </div>
  </footer>

  <script>
    (function() {
      const btn = document.getElementById('backToTop');
      window.addEventListener('scroll', function() {
        btn.classList.toggle('visible', window.scrollY > 400);
      });
    })();
  </script>

  <script src="../../assets/js/nav.js" defer></script>
  <script src="../../assets/js/nav-drawer.js" defer></script>
  <script src="../../assets/js/theme.js" defer></script>
  <script src="../../assets/js/command-palette.js" defer></script>

  <script>
    (function() {
      const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
      const now = new Date();
      const dateStr = `${now.getDate()} de ${months[now.getMonth()]} de ${now.getFullYear()}`;
      const metaEdition = document.getElementById('meta-edition');
      if (metaEdition) metaEdition.textContent = `Publicado {{date}} · Última edición ${dateStr}`;
    })();
  </script>

</body>
</html>
