  <style>
    /* ── Línea de tiempo ─────────────────────────────── */

    .changelog-entry {
      position: relative;
      padding: 0 0 36px 28px;
      border-left: 2px solid var(--border);
    }

    .changelog-entry:last-child {
      border-left-color: transparent;
      padding-bottom: 0;
    }

    /* Punto en la línea */
    .changelog-entry::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 5px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--surface);
    }

    /* ── Tipografía ──────────────────────────────────── */

    .changelog-entry h3 {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin: 0 0 7px;
    }

    .changelog-entry h4 {
      font-family: 'Source Serif 4', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 10px;
      line-height: 1.3;
    }

    .changelog-entry p {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      margin: 0 0 8px;
    }

    .changelog-entry ul {
      margin: 4px 0 8px 18px;
      padding: 0;
    }

    .changelog-entry li {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 5px;
    }

    .changelog-entry code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 2px;
    }

    .changelog-loading {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--muted);
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
  <script>
    function wrapEntries(container) {
      const nodes = Array.from(container.childNodes);
      container.innerHTML = '';
      let entry = null;

      for (const node of nodes) {
        const tag = node.nodeType === Node.ELEMENT_NODE ? node.tagName : '';
        if (tag === 'HR') continue; // los separadores los maneja el diseño
        if (tag === 'H3') {
          entry = document.createElement('div');
          entry.className = 'changelog-entry';
          container.appendChild(entry);
        }
        (entry || container).appendChild(node);
      }
    }

    const url = window.getContentPath?.('changelog.md') ?? './content/changelog.md';
    fetch(url)
      .then(r => r.text())
      .then(md => {
        const container = document.querySelector('.changelog-content');
        container.innerHTML = marked.parse(md);
        wrapEntries(container);
      })
      .catch(() => {
        document.querySelector('.changelog-content').innerHTML =
          '<p>No se pudo cargar el historial.</p>';
      });
  </script>
