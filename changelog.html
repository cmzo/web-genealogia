  <style>
    /* ── Línea de tiempo ─────────────────────────────── */

    .changelog-entry {
      position: relative;
      padding: 0 0 36px 28px;
      border-left: 2px solid var(--border);
    }

    .changelog-entry:last-child {
      border-left-color: transparent;
      padding-bottom: 0;
    }

    /* Punto en la línea */
    .changelog-entry::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 5px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--surface);
    }

    /* ── Tipografía ──────────────────────────────────── */

    .changelog-entry h3 {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin: 0 0 7px;
    }

    .changelog-entry h4 {
      font-family: 'Source Serif 4', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 10px;
      line-height: 1.3;
    }

    /* Etiqueta para marcar el tipo de cambio (ej. nueva funcionalidad) */
    .changelog-tag {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 999px;
      vertical-align: middle;
      margin-right: 8px;
      position: relative;
      top: -2px;
    }
    /* Paleta coolors. Tipos de cambio:
       Función nueva = herramienta/sección entirely new · Novedad = feature nueva en algo existente */
    .changelog-tag          { background: #3d405b; color: #f4f1de; }  /* (por defecto) Novedad */
    .changelog-tag--nueva   { background: #e07a5f; color: #f4f1de; }  /* Función nueva (terracota) */
    .changelog-tag--novedad { background: #3d405b; color: #f4f1de; }  /* Novedad (azul pizarra)    */
    .changelog-tag--mejora  { background: #81b29a; color: #3d405b; }  /* Mejora (verde salvia)     */
    .changelog-tag--fix     { background: #f2cc8f; color: #3d405b; }  /* Arreglo (arena)           */

    .changelog-entry p {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      margin: 0 0 8px;
    }

    .changelog-entry ul {
      margin: 4px 0 8px 18px;
      padding: 0;
    }

    .changelog-entry li {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 5px;
    }

    .changelog-entry code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 2px;
    }

    .changelog-loading {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body data-section="changelog" data-section-label="cambios">

  <script src="./assets/js/path-config.js"></script>
  <script src="./assets/js/vendor/marked.min.js"></script>
  <script>
    function wrapEntries(container) {
      const nodes = Array.from(container.childNodes);
      container.innerHTML = '';
      let entry = null;

      for (const node of nodes) {
        const tag = node.nodeType === Node.ELEMENT_NODE ? node.tagName : '';
        if (tag === 'HR') continue; // los separadores los maneja el diseño
        if (tag === 'H3') {
          entry = document.createElement('div');
          entry.className = 'changelog-entry';
          container.appendChild(entry);
        }
        (entry || container).appendChild(node);
      }
    }

    const url = window.getContentPath?.('changelog.md') ?? './content/changelog.md';
    fetch(url)
      .then(r => r.text())
      .then(md => {
        const container = document.querySelector('.changelog-content');
        container.innerHTML = marked.parse(md);
        wrapEntries(container);
      })
      .catch(() => {
        document.querySelector('.changelog-content').innerHTML =
          '<p>No se pudo cargar el historial.</p>';
      });
  </script>

<script src="assets/js/nav.js" defer></script>
