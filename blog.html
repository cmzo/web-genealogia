<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <script>(function(){try{var t=localStorage.getItem("theme");if(!t)t=matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
  <link rel="icon" href="./assets/images/favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blog · Matías Clemenzo</title>
  <meta name="description" content="Entradas de investigación genealógica sobre la familia Clemenzo: censos del Valais, registros civiles, migraciones y hallazgos documentales." />
  <link rel="canonical" href="https://cmzo.net/blog" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Blog · Matías Clemenzo" />
  <meta property="og:description" content="Entradas de investigación genealógica sobre la familia Clemenzo: censos del Valais, registros civiles, migraciones y hallazgos documentales." />
  <meta property="og:url" content="https://cmzo.net/blog" />
  <link rel="stylesheet" href="./assets/css/styles.css" />
  <link rel="stylesheet" href="./assets/css/home.css" />
</head>
<body data-section="blog">

  <a href="#main-content" class="skip-link">Saltar al contenido</a>

  <header class="cmzo-top"><!-- la genera nav.js según data-section --></header>

  <main id="main-content" class="cmzo cmzo-wrap cmzo-page">
    <header class="blog-header">
      <h1 class="blog-header-title">Blog</h1>
      <p class="blog-header-subtitle">Investigaciones, historias y memoria familiar</p>
    </header>

    <section class="blog-grid" id="blogGrid">
      <div class="loading-cards">
        <div class="loading-spinner"></div>
        <p>Cargando posts…</p>
      </div>
    </section>
  </main>

  <footer class="cmzo-foot">
    <div class="cmzo-foot-inner">
      <div class="sig">// diseñado y mantenido por <b>Matías Clemenzo</b> · 2026</div>
      <div class="cmzo-foot-links"><a href="colaborar.html">colaborar</a><a href="changelog.html">cambios</a></div>
    </div>
  </footer>

  <script>
    async function loadBlogPosts() {
      try {
        const response = await fetch('./assets/data/blog-entries.json');
        const posts = await response.json();
        renderPosts(posts);
      } catch (error) {
        document.getElementById('blogGrid').innerHTML =
          '<p class="no-results">Error cargando los posts. Intentá recargar la página.</p>';
      }
    }

    function renderPosts(posts) {
      const grid = document.getElementById('blogGrid');
      if (!posts.length) {
        grid.innerHTML = '<p class="no-results">No hay posts disponibles.</p>';
        return;
      }
      const globe = '<svg class="lang-globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a15 15 0 0 1 0 18 15 15 0 0 1 0-18"/></svg>';
      grid.innerHTML = posts.map(post => {
        const langs = post.langs || [];
        const langBadge = langs.length > 1
          ? `<span class="blog-card-langs" title="Disponible en ${langs.map(l => l.toUpperCase()).join(', ')}">${globe}${langs.map(l => `<span class="lang-chip">${l}</span>`).join('')}</span>`
          : '';
        return `
        <a href="${post.url}" class="blog-card">
          <div class="blog-card-content">
            <div class="blog-card-category">${post.category}</div>
            <h2 class="blog-card-title">${post.title}</h2>
            <p class="blog-card-desc">${post.description}</p>
            <div class="blog-card-meta"><span>${post.date}</span>${langBadge}</div>
          </div>
        </a>`;
      }).join('');
    }

    loadBlogPosts();
  </script>

<script src="assets/js/nav.js" defer></script>
<script src="assets/js/nav-drawer.js" defer></script>
<script src="assets/js/theme.js" defer></script>
<script src="assets/js/command-palette.js" defer></script>
</body>
</html>
