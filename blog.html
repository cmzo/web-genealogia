  <div class="site-body">
    <aside class="site-sidebar">
      <nav class="sidebar-nav">

        <a href="changelog.html" class="sidebar-link sidebar-link--minor">Cambios</a>
      </div>
    </aside>

    <main class="site-main">
      <header class="blog-header">
        <h1 class="blog-header-title">Blog</h1>
        <p class="blog-header-subtitle">Investigaciones, historias y memoria familiar</p>
      </header>

      <section class="blog-grid" id="blogGrid">
        <div class="loading-cards">
          <div class="loading-spinner"></div>
          <p>Cargando posts…</p>
        </div>
      </section>
    </main>
  </div>

  <footer class="site-footer">
    <p class="footer-desc">Diseñado y mantenido por <strong>Matías Clemenzo</strong> · 2026</p>
  </footer>

  <script>
    async function loadBlogPosts() {
      try {
        const response = await fetch('./assets/data/blog-entries.json');
        const posts = await response.json();
        renderPosts(posts);
      } catch (error) {
        document.getElementById('blogGrid').innerHTML =
          '<p class="no-results">Error cargando los posts. Intentá recargar la página.</p>';
      }
    }

    function renderPosts(posts) {
      const grid = document.getElementById('blogGrid');
      if (!posts.length) {
        grid.innerHTML = '<p class="no-results">No hay posts disponibles.</p>';
        return;
      }
      grid.innerHTML = posts.map(post => `
        <a href="${post.url}" class="blog-card">
          <div class="blog-card-content">
            <div class="blog-card-category">${post.category}</div>
            <h2 class="blog-card-title">${post.title}</h2>
            <p class="blog-card-desc">${post.description}</p>
            <div class="blog-card-meta">${post.date}</div>
          </div>
        </a>
      `).join('');
    }

    loadBlogPosts();
  </script>
