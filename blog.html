  <script>
    async function loadBlogPosts() {
      try {
        const response = await fetch('./assets/data/blog-entries.json');
        const posts = await response.json();
        renderPosts(posts);
      } catch (error) {
        document.getElementById('blogGrid').innerHTML =
          '<p class="no-results">Error cargando los posts. Intentá recargar la página.</p>';
      }
    }

    function renderPosts(posts) {
      const grid = document.getElementById('blogGrid');
      if (!posts.length) {
        grid.innerHTML = '<p class="no-results">No hay posts disponibles.</p>';
        return;
      }
      const globe = '<svg class="lang-globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a15 15 0 0 1 0 18 15 15 0 0 1 0-18"/></svg>';
      grid.innerHTML = posts.map(post => {
        const langs = post.langs || [];
        const langBadge = langs.length > 1
          ? `<span class="blog-card-langs" title="Disponible en ${langs.map(l => l.toUpperCase()).join(', ')}">${globe}${langs.map(l => `<span class="lang-chip">${l}</span>`).join('')}</span>`
          : '';
        return `
        <a href="${post.url}" class="blog-card">
          <div class="blog-card-content">
            <div class="blog-card-category">${post.category}</div>
            <h2 class="blog-card-title">${post.title}</h2>
            <p class="blog-card-desc">${post.description}</p>
            <div class="blog-card-meta"><span>${post.date}</span>${langBadge}</div>
          </div>
        </a>`;
      }).join('');
    }

    loadBlogPosts();
  </script>
