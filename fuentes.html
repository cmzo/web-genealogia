  <style>
    .fuentes-content h1 { display: none; }

    /* Párrafo de intro */
    .fuentes-content > p:first-child {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 0;
    }

    /* Sección país/región */
    .fuentes-content h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(24px, 3vw, 32px);
      font-weight: 700;
      color: var(--text);
      margin: 64px 0 28px;
      padding-bottom: 14px;
      position: relative;
      border-bottom: 1px solid var(--border);
    }

    .fuentes-content h2::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 36px;
      height: 2px;
      background: var(--accent);
    }

    .fuentes-content h2:first-of-type {
      margin-top: 32px;
    }

    /* Tarjeta de institución */
    .fuente-entry {
      padding: 0 0 0 20px;
      border-left: 2px solid var(--border);
      margin-bottom: 0;
      transition: border-color 0.2s;
    }

    .fuente-entry:hover {
      border-left-color: var(--accent);
    }

    /* Nombre de institución */
    .fuente-entry h3 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(18px, 2vw, 22px);
      font-weight: 700;
      color: var(--text);
      margin: 0 0 12px;
      line-height: 1.35;
    }

    /* Líneas de contacto: **Web:**, **Tel:**, etc. */
    .fuente-meta {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin: 0 0 6px;
    }

    .fuente-meta strong { font-weight: 600; color: var(--muted); }

    .fuente-meta a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }

    /* Texto descriptivo dentro de entrada */
    .fuente-entry p {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.75;
      color: var(--text);
      margin: 0 0 16px;
    }

    .fuente-entry ul, .fuente-entry ol {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      margin: 0 0 16px;
      padding-left: 22px;
    }

    .fuente-entry li { margin-bottom: 6px; }

    .fuente-entry strong { font-weight: 700; color: var(--accent); }

    .fuente-entry em { font-style: italic; }

    .fuente-entry a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }

    /* Separador visual entre tarjetas */
    .fuente-separator {
      height: 32px;
    }

    /* Tabla de bibliografía */
    .fuentes-content .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 16px 0 24px;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .fuentes-content table {
      border-collapse: collapse;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      width: 100%;
    }

    .fuentes-content th {
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .fuentes-content th:last-child { border-right: none; }

    .fuentes-content td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      color: var(--text);
      vertical-align: top;
      line-height: 1.6;
      font-size: 14px;
    }

    .fuentes-content td:last-child { border-right: none; }

    .fuentes-content tr:last-child td { border-bottom: none; }

    /* Nota de actualización al pie */
    .fuentes-update {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: var(--muted);
      margin-top: 56px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
  </style>

  <script>
    function postProcess(container) {
      const children = Array.from(container.children);
      const fragment = document.createDocumentFragment();
      let currentCard = null;

      for (const el of children) {
        if (el.tagName === 'H1') {
          continue;
        } else if (el.tagName === 'H2') {
          if (currentCard) { fragment.appendChild(currentCard); currentCard = null; }
          fragment.appendChild(el);
        } else if (el.tagName === 'H3') {
          if (currentCard) { fragment.appendChild(currentCard); currentCard = null; }
          currentCard = document.createElement('div');
          currentCard.className = 'fuente-entry';
          currentCard.appendChild(el);
        } else if (el.tagName === 'HR') {
          if (currentCard) {
            fragment.appendChild(currentCard);
            currentCard = null;
            const sep = document.createElement('div');
            sep.className = 'fuente-separator';
            fragment.appendChild(sep);
          }
        } else if (el.tagName === 'P') {
          const isLastP = el === children[children.length - 1];
          if (isLastP && el.textContent.startsWith('Última actualización')) {
            if (currentCard) { fragment.appendChild(currentCard); currentCard = null; }
            el.className = 'fuentes-update';
            fragment.appendChild(el);
          } else if (currentCard) {
            const firstChild = el.firstChild;
            if (firstChild && firstChild.nodeName === 'STRONG') {
              el.className = 'fuente-meta';
            }
            currentCard.appendChild(el);
          } else {
            fragment.appendChild(el);
          }
        } else {
          if (currentCard) currentCard.appendChild(el);
          else fragment.appendChild(el);
        }
      }
      if (currentCard) fragment.appendChild(currentCard);
      container.innerHTML = '';
      container.appendChild(fragment);
    }

    marked.use({ renderer: {
      table(header, body) {
        return `<div class="table-wrapper"><table><thead>${header}</thead><tbody>${body}</tbody></table></div>\n`;
      }
    }});

    const url = window.getContentPath?.('fuentes.md') ?? './content/fuentes.md';
    fetch(url)
      .then(r => r.text())
      .then(md => {
        const html = marked.parse(md);
        const container = document.querySelector('.fuentes-content');
        container.innerHTML = html;
        postProcess(container);
      })
      .catch(() => {
        document.querySelector('.fuentes-content').innerHTML = '<p>No se pudo cargar el contenido.</p>';
      });
  </script>
