    .sobre-content th:last-child { border-right: none; }

      font-size: 14px;

    }

    .sobre-content hr {

    .sobre-content mark {

      color: inherit;

  <script>
    function _calloutLabel(t) {
      return ({note:'Nota',info:'Información',tip:'Consejo',hint:'Pista',importante:'Importante',warning:'Advertencia',caution:'Precaución',danger:'Peligro',error:'Error',success:'Éxito',quote:'Cita',example:'Ejemplo'})[t] || t.charAt(0).toUpperCase() + t.slice(1);
    }
    function _calloutIcon(t) {
      return ({note:'ℹ',info:'ℹ',tip:'✦',hint:'✦',important:'★',warning:'▲',caution:'▲',danger:'✕',error:'✕',success:'✓',quote:'"',example:'◆'})[t] || '·';
    }
    function processCallouts(html) {
      return html.replace(/<blockquote>\n<p>\[!([A-Za-z_]+)\]([^\n<]*)([\s\S]*?)<\/blockquote>/g, (m, type, titleRest, bodyRest) => {
        const t = type.toLowerCase();
        const title = titleRest.trim() || _calloutLabel(t);
        let body = bodyRest;
        if (body.startsWith('\n')) body = body.substring(1).replace(/^([^<]*)<\/p>/, (_, c) => c.trim() ? `<p>${c.trim()}</p>` : '');
        else body = body.replace(/^<\/p>/, '').trim();
        body = body.trim();
        return `<div class="callout callout--${t}"><div class="callout-title"><span class="callout-icon">${_calloutIcon(t)}</span><span>${title}</span></div>${body ? `<div class="callout-body">${body}</div>` : ''}</div>`;
      });
    }

    marked.use({ renderer: {
      table(header, body) {
        return `<div class="table-wrapper"><table><thead>${header}</thead><tbody>${body}</tbody></table></div>\n`;
      }
    }});

    // Chrome de la página (título y bajada). ES completo; traducir fr/en.
    const CHROME = {
      es: { kicker: 'Proyecto de investigación', title: 'Sobre el proyecto' },
      fr: { kicker: 'Projet de recherche', title: 'À propos du projet' },
      en: { kicker: 'Research project', title: 'About the project' },
    };

    function renderContent(md) {
      md = md.replace(/==([^=\n]+)==/g, '<mark>$1</mark>');
      let html = marked.parse(md);
      html = processCallouts(html);
      const container = document.querySelector('.sobre-content');
      container.innerHTML = html;

      // Convertir bloques mermaid y cargar la librería
      const mermaidBlocks = container.querySelectorAll('pre code.language-mermaid');
      if (mermaidBlocks.length) {
        mermaidBlocks.forEach(el => {
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = el.textContent;
          el.parentElement.replaceWith(div);
        });
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js';
        s.onload = () => {
          mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
          mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
        };
        document.head.appendChild(s);
      }
    }

    function sobreFile(lang) {
      const name = lang === 'es' ? 'sobre.md' : `sobre.${lang}.md`;
      return window.getContentPath?.(name) ?? ('./content/' + name);
    }

    function loadSobre(lang) {
      fetch(sobreFile(lang))
        .then(r => { if (!r.ok) throw new Error('missing'); return r.text(); })
        .then(renderContent)
        .catch(() => {
          if (lang !== 'es') { loadSobre('es'); return; }  // respaldo si falta la traducción
          document.querySelector('.sobre-content').innerHTML = '<p>No se pudo cargar el contenido.</p>';
        });
    }

    // ── Idioma ──────────────────────────────────────────
    let curLang = (new URLSearchParams(location.search).get('lang') || localStorage.getItem('site_lang') || 'es').toLowerCase();
    if (!['es', 'fr', 'en'].includes(curLang)) curLang = 'es';

    function applyChrome(lang) {
      const c = CHROME[lang] || CHROME.es;
      document.getElementById('sobreKicker').textContent = c.kicker;
      document.getElementById('sobreTitle').textContent = c.title;
      document.documentElement.lang = lang;
      document.querySelectorAll('.lang-opt').forEach(o => o.classList.toggle('is-active', o.dataset.lang === lang));
    }

    function setLang(lang) {
      curLang = lang;
      localStorage.setItem('site_lang', lang);
      const u = new URL(location); u.searchParams.set('lang', lang); history.replaceState(null, '', u);
      applyChrome(lang);
      loadSobre(lang);
    }

    document.querySelectorAll('.lang-opt').forEach(o => o.addEventListener('click', () => setLang(o.dataset.lang)));

    applyChrome(curLang);
    loadSobre(curLang);
  </script>
